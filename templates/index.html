<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aviso Bot v9.0 Live</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0d0d0d; color: #00ff41; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 15px; margin: 8px 0; background: #000; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .mode-start { background: linear-gradient(45deg, #006400, #00ff41); color: black; }
        .mode-stop { background: linear-gradient(45deg, #8b0000, #ff0000); color: white; }
        
        .btn-log { background: #2196F3; color: white; font-size: 14px; padding: 10px; width: 48%; display: inline-block; }
        .btn-clear { background: #f44336; color: white; font-size: 14px; padding: 10px; width: 48%; display: inline-block; }
        
        .proxy-box { margin-top: 20px; padding: 15px; background: #222; border: 1px solid #444; border-radius: 8px; }
        .btn-proxy { width: 48%; padding: 8px; font-size: 12px; margin-top: 5px; }

        .status-wrapper { margin-top: 20px; background: #000; border: 1px dashed #00ff41; padding: 15px; border-radius: 8px; }
        .live-status { font-size: 16px; color: #fff; margin-top: 5px; font-weight: bold; }
        
        .terminal-box { margin-top: 10px; background: #000; border: 1px solid #333; padding: 10px; height: 150px; overflow-y: auto; font-size: 11px; color: #0f0; border-radius: 5px; line-height: 1.4; word-wrap: break-word;}
        .log-error { color: #ff4c4c; }
        .log-warn { color: #ffeb3b; }
        
        #code-area { display: none; background: #2a2000; border: 2px solid #ffcc00; padding: 15px; margin-top: 15px; border-radius: 8px; }
        .btn-code { background: #ff9800; color: black; }

        /* ---> NEW GALLERY TOGGLE STYLES <--- */
        .gallery-header { background: #222; color: #00ff41; padding: 10px 15px; margin-top: 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; font-weight: bold; border: 1px solid #444; user-select: none; }
        .gallery-header:hover { background: #333; }
        .gallery-container { display: none; overflow-x: auto; gap: 10px; padding: 15px 10px; scroll-behavior: smooth; background: #0a0a0a; border: 1px dashed #444; border-top: none; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
        .gallery-container img { height: 150px; border-radius: 8px; border: 2px solid #333; flex-shrink: 0; cursor: pointer; object-fit: cover; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🤖 Aviso Bot v9.0</h2>
        
        <input type="text" id="username" placeholder="Username / Email">
        <input type="password" id="password" placeholder="Password">
        
        <button id="actionBtn" class="mode-start" onclick="toggleBot()">🚀 START SYSTEM</button>
        
        <div style="margin-top: 10px; display: flex; justify-content: space-between;">
             <button class="btn-log" onclick="window.location.href='/download_log'">📥 Get HTML</button>
             <button class="btn-clear" onclick="clearData()">🗑️ WIPE DATA</button>
        </div>

        <div class="proxy-box">
            <h4 style="margin:0 0 10px 0; color:#00bcd4;">🌐 Proxy Settings</h4>
            <input type="text" id="proxyInput" placeholder="ip:port:user:pass" style="padding:10px; font-size:14px;">
            <div style="display:flex; justify-content:space-between;">
                <button class="btn-proxy" style="background:#009688; color:white;" onclick="saveProxy()">💾 Save Proxy</button>
                <button class="btn-proxy" style="background:#607d8b; color:white;" onclick="clearProxy()">❌ Direct IP</button>
            </div>
            <div id="proxy-status" style="font-size:12px; color:#aaa; margin-top:5px;">Status: Direct IP</div>
        </div>

        <div id="code-area">
            <h3 style="margin:0 0 10px 0; color:#ffcc00;">🔑 Code Required</h3>
            <input type="text" id="otp-input" placeholder="Type Code Here...">
            <button class="btn-code" onclick="submitCode()">Confirm Code</button>
        </div>

        <div class="status-wrapper">
            <div style="font-size: 12px; color: #888;">CURRENT STEP:</div>
            <div id="status-text" class="live-status">System Ready.</div>
            
            <div style="font-size: 12px; color: #888; margin-top:10px;">LIVE CONSOLE:</div>
            <div id="terminal" class="terminal-box">Waiting for bot to start...</div>
        </div>

        NEW COLLAPSIBLE GALLERY <--- -->
        <div class="gallery-header" onclick="toggleGallery()">
            <span>🖼️ Live Screenshots</span>
            <span id="gallery-arrow">🔽</span>
        </div>
        <div class="gallery-container" id="gallery"></div>
        </div>

    <script>
        const displayedImages = new Set();
        let isBotRunning = false;
        let isGalleryOpen = false; // Gallery by default band hogi

        window.onload = function() {
            const savedUser = localStorage.getItem('aviso_user');
            const savedPass = localStorage.getItem('aviso_pass');
            if (savedUser) document.getElementById('username').value = savedUser;
            if (savedPass) document.getElementById('password').value = savedPass;
            pollStatus();
        };

        function toggleBot() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('actionBtn');

            if (!isBotRunning) {
                if(!u || !p) { alert("❌ Enter login details!"); return; }
                localStorage.setItem('aviso_user', u);
                localStorage.setItem('aviso_pass', p);

                fetch('/start', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: u, password: p})
                });
                btn.innerText = "⏳ STARTING...";
                btn.disabled = true;
            } else {
                if(confirm("🛑 Stop bot?")) {
                    fetch('/stop', { method: 'POST' });
                    btn.innerText = "🛑 STOPPING...";
                    btn.disabled = true;
                }
            }
        }

        function saveProxy() {
            const p = document.getElementById('proxyInput').value;
            fetch('/save_proxy', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({proxy: p})
            }).then(r => r.json()).then(d => alert(d.status));
        }

        function clearProxy() {
            fetch('/clear_proxy', {method: 'POST'})
            .then(r => r.json()).then(d => alert(d.status));
            document.getElementById('proxyInput').value = "";
        }

        function clearData() {
            if(confirm("⚠ WARNING: This will delete all cookies. Are you sure?")) {
                fetch('/clear_data', { method: 'POST' })
                .then(r => r.json())
                .then(d => alert(d.status));
            }
        }

        function submitCode() {
            const code = document.getElementById('otp-input').value;
            if(code) {
                fetch('/submit_code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({code: code})
                });
                document.getElementById('code-area').style.display = "none";
                document.getElementById('otp-input').value = "";
            }
        }

        // ---> NEW GALLERY TOGGLE LOGIC <---
        function toggleGallery() {
            isGalleryOpen = !isGalleryOpen;
            const gal = document.getElementById('gallery');
            const arrow = document.getElementById('gallery-arrow');
            
            if (isGalleryOpen) {
                gal.style.display = 'flex';
                arrow.innerText = '🔼';
            } else {
                gal.style.display = 'none';
                arrow.innerText = '🔽';
                // Jab gallery band ho to purani tasweeren memory se nikal do
                gal.innerHTML = '';
                displayedImages.clear();
            }
        }
        // ----------------------------------

        function pollStatus() {
            fetch('/status').then(r => r.json()).then(data => {
                const statusEl = document.getElementById('status-text');
                if (statusEl.innerText !== data.step) statusEl.innerText = data.step;

                const term = document.getElementById('terminal');
                if (data.logs && data.logs.length > 0) {
                    let logHtml = data.logs.map(log => {
                        if (log.includes("❌")) return `<span class="log-error">${log}</span>`;
                        if (log.includes("⚠️") || log.includes("🚨") || log.includes("🔪")) return `<span class="log-warn">${log}</span>`;
                        return log;
                    }).join('<br>');
                    
                    if (term.innerHTML !== logHtml) {
                        term.innerHTML = logHtml;
                        term.scrollTop = term.scrollHeight; 
                    }
                }

                if(data.proxy_status) {
                    document.getElementById('proxy-status').innerText = "Status: " + data.proxy_status;
                }

                const btn = document.getElementById('actionBtn');
                isBotRunning = data.is_running;
                if (data.is_running) {
                    btn.innerText = "🛑 STOP SYSTEM";
                    btn.className = "mode-stop";
                    btn.disabled = false;
                } else {
                    btn.innerText = "🚀 START SYSTEM";
                    btn.className = "mode-start";
                    btn.disabled = false;
                }

                const codeDiv = document.getElementById('code-area');
                if (data.needs_code) codeDiv.style.display = 'block';
                else codeDiv.style.display = 'none';

                // ---> SMART IMAGE LOADING LOGIC <---
                // Sirf tab load karega jab gallery open hogi
                if (isGalleryOpen) {
                    const gallery = document.getElementById('gallery');
                    data.images.forEach(imgName => {
                        if (!displayedImages.has(imgName)) {
                            displayedImages.add(imgName); 
                            
                            const img = document.createElement('img');
                            img.src = `/view_image/${imgName}`; 
                            
                            img.onerror = function() {
                                setTimeout(() => {
                                    this.src = `/view_image/${imgName}?retry=1`;
                                }, 1000); 
                            };

                            img.onclick = function() { window.open(`/view_image/${imgName}`, '_blank'); };
                            
                            gallery.appendChild(img);
                            if (gallery.children.length > 10) gallery.removeChild(gallery.firstElementChild);
                            
                            setTimeout(() => {
                                gallery.scrollLeft = gallery.scrollWidth;
                            }, 100);
                        }
                    });
                }
                // -----------------------------------

            }).catch(e => {
                // Connection error handle
            });
        }
        setInterval(pollStatus, 1000);
    </script>
</body>
</html>
